{% extends 'base.html' %}

{% block content %}

<section class="viewdata-section">

    <div class="container">

        <h1 class="page-title">
            Registered Users
        </h1>

        <div class="table-card">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    {% for user in users %}

                    <tr>

                        <td>{{ user.id }}</td>

                        <td>{{ user.name }}</td>

                        <td>{{ user.email }}</td>

                        <td>{{ user.phone }}</td>

                        <td>

                            <a href="/edit/{{ user.id }}/" class="btn btn-warning btn-sm">

                                Edit

                            </a>

                            <a href="/delete/{{ user.id }}/" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this user?')">

                                Delete

                            </a>
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</section>

{% endblock %}
