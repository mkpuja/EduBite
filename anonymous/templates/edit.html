{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="text-center mb-4">
            Edit User
        </h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="name"
                value="{{ user.name }}"
                class="form-control mb-3">

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                class="form-control mb-3">

            <input
                type="text"
                name="phone"
                value="{{ user.phone }}"
                class="form-control mb-3">

            <button
                type="submit"
                class="btn btn-success">

                Update User

            </button>

        </form>

    </div>

</div>

{% endblock %}
