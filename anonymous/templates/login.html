{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="login-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5">

                <div class="login-card">

                    <h2>Welcome Back</h2>

                    <p>Login to continue ordering delicious food</p>

                    <form method="POST">

                        {% csrf_token %}

                        {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                        {% endif %}

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Email Address"
                            required>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Password"
                            required>

                        <button
                            type="submit"
                            class="login-btn">

                            Login

                        </button>

                    </form>

                    <div class="register-link">

                        Don't have an account?

                        <a href="/register/">
                            Register
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
